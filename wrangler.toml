name = "inksportal"
main = "src/index.js"
compatibility_date = "2024-11-01"
account_id = "3bc7426bd16f8f8787fa5bc1b01b5715"

# 前端静态资源(原 env.ASSETS 绑定)。把页面文件放到 ./public 下。
[assets]
directory = "./public"
binding = "ASSETS"

# R2 桶绑定(代码里通过 env.R2_STORAGE 直接读写)
[[r2_buckets]]
binding = "R2_STORAGE"
bucket_name = "inksportal"
preview_bucket_name = "inksportal"  # 小项目,本地 --remote 调试复用同一桶

# 注意:线上 Worker 已把下列 4 个值全部设为 secret(机密)。
# 不要在此用 [vars] 重复定义,否则 deploy 会用明文覆盖同名 secret。
#   R2_ACCOUNT_ID / R2_BUCKET / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
# 本地开发:把这 4 个值填入 .dev.vars(已被 git 忽略)。
# 线上修改某个值:npx wrangler secret put <NAME>
